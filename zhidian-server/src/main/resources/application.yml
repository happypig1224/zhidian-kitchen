server:
  port: 8081

spring:
  main:
    banner-mode: off
    lazy-initialization: true
    allow-bean-definition-overriding: true
  profiles:
    active: dev
  datasource:
    driver-class-name: ${zhidian.datasource.driver-class-name}
    url: jdbc:mysql://${zhidian.datasource.host}:${zhidian.datasource.port}/${zhidian.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${zhidian.datasource.username}
    password: ${zhidian.datasource.password}
    hikari:
      maximum-pool-size: 50       # 开发环境减小连接池
      minimum-idle: 5             # 减少空闲连接
      connection-timeout: 10000   # 缩短连接超时
      idle-timeout: 300000        # 5 分钟空闲超时
      max-lifetime: 900000        # 15 分钟生命周期
      initialization-fail-timeout: -1  # 不阻塞启动
  data:
    redis:
      host: ${zhidian.redis.host}
      password: ${zhidian.redis.password}
      port: ${zhidian.redis.port}
      database: ${zhidian.redis.database}
      timeout: 5000
      lettuce:
        pool:
          enabled: true         # 启用连接池
          max-active: 8         # 最大连接数
          max-idle: 4           # 最大空闲连接
          min-idle: 2           # 最小空闲连接
          max-wait: 5000        # 获取连接最大等待时间
rocketmq:
  name-server: ${zhidian.rocketmq.name-server}
  producer:
    group: ${zhidian.rocketmq.producer-group}
    send-message-timeout: 3000 # 发送消息超时时间
    # 发送消息失败重试次数，网络波动时
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
    max-message-size: 4194304  # 最大消息大小 4MB
    compress-message-body-threshold: 4096  # 压缩阈值 4KB
    retry-another-when-broker-not-available: false
  consumer:
    group: ${zhidian.rocketmq.consumer-group}
    consume-thread-number: 4   # 开发环境减少消费线程
    consume-thread-max: 16     # 减少最大消费线程
    pull-batch-size: 16        # 减少批量拉取数量
    enabled: false             # 默认禁用消费者，需要时再启用

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.zhidian.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true


zhidian:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key: shxy
    user-ttl: 7200000
    user-token-name: authentication
  wechat:
    appid: ${zhidian.wechat.appid}
    secret: ${zhidian.wechat.secret}
  tencent:
    cos:
      secret-id: ${zhidian.tencent.cos.secret-id}
      secret-key: ${zhidian.tencent.cos.secret-key}
      region: ${zhidian.tencent.cos.region}
      bucket-name: ${zhidian.tencent.cos.bucket-name}
      avatar-dir: ${zhidian.tencent.cos.avatar-dir}
      image-dir: ${zhidian.tencent.cos.image-dir}

  # 添加以下配置
autoconfigure:
  exclude:
    - springfox.documentation.spring.web.plugins.Docket
    - springfox.documentation.spring.web.plugins.WebMvcRequestHandlerProvider

  # 在文件末尾添加 Swagger 配置
springfox:
  documentation:
    enabled: false